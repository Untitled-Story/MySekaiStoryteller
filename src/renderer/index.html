<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MySekaiStoryteller</title>
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: mss:; connect-src 'self' mss:; media-src mss:"
    />

    <link href="./assets/main.css" type="text/css" rel="stylesheet" />
  </head>

  <body>
    <h1 id="select-file-tips">Please select a story file</h1>
    <div id="config" hidden="hidden">
      <div class="controls-container">
        <h1 id="configuration_label">Configuration</h1>
        <label for="resolution">Select Resolution: </label>
        <select id="resolution" class="option-select">
          <option value="1280x720" selected>1280x720</option>
          <option value="1920x1080">1920x1080</option>
        </select>

        <label for="renderScale">Rendering Quality: </label>
        <select id="renderScale" class="option-select">
          <option value="0.85">0.85</option>
          <option value="0.9">0.9</option>
          <option value="0.95">0.95</option>
          <option value="1.0" selected>1.0</option>
          <option value="1.25">1.25</option>
          <option value="1.5">1.5</option>
          <option value="1.75">1.75</option>
          <option value="2.0">2.0</option>
        </select>

        <label for="runMode">Run Mode: </label>
        <select id="runMode" class="option-select">
          <option value="preview" selected>Preview</option>
          <option value="render">Render Frames</option>
        </select>

        <div id="exportDirectoryControls" hidden="hidden">
          <label>Export Directory: </label>
          <button class="styled-button" id="selectExportDirectory">Select Directory</button>
          <p id="exportDirectoryPath">No directory selected</p>
        </div>
      </div>
      <button class="styled-button" id="apply">Apply</button>
    </div>
    <div id="app" hidden="hidden"></div>
    <div id="renderProgress" hidden="hidden">
      <h2>Rendering</h2>
      <p id="renderProgressPhase">Phase: Idle</p>
      <p id="renderProgressFps">FPS: -</p>
      <p id="renderProgressFrame">Frames: 0 / 0</p>
      <p id="renderProgressTime">Time: 0s / 0s</p>
      <p id="renderProgressPercent">Progress: 0.0%</p>
      <p id="renderProgressElapsed">Rendered elapsed: 0s</p>
      <p id="renderProgressEta">ETA: -</p>
      <p id="renderProgressSnippet">Snippet: 0 / 0</p>
      <p id="renderProgressAudio">Audio clips: 0</p>
      <p id="renderProgressOutput">Output: -</p>
      <p id="renderProgressFfmpeg">FFmpeg: -</p>
    </div>
    <script type="module" src="src/index.ts"></script>
    <!-- Live2D libraries imported at electron.vite.config.ts -->
  </body>
</html>
